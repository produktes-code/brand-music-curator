name: Promote Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Run ID to download artifacts from'
        required: true
      tag:
        description: 'Tag for the release'
        required: true
        default: 'v1.1.0'

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.run_id }}
          path: artifacts
          
      - name: Prepare assets
        run: |
          mkdir -p release_assets
          find artifacts -type f -name "*.dmg" -exec cp {} release_assets/ \;
          find artifacts -type f -name "*.exe" -exec cp {} release_assets/ \;
          if [ -f "docs/USER_MANUAL.pdf" ]; then
            cp docs/USER_MANUAL.pdf release_assets/
          fi
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: "${{ github.event.inputs.tag }} - Production Build (Clean Code)"
          body: |
            ## Cambios en v1.1.0
            - Código limpio: 0 errores ESLint
            - 20 correcciones forenses aplicadas
            - Workflows de GitHub Actions funcionales
            - Instaladores generados y verificados
            - Build limpio sin errores
          files: release_assets/*
