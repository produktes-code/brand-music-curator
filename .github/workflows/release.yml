name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${ matrix.os }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
        working-directory: ./player
      - run: npm run build --if-present
        working-directory: ./player
      - run: npx electron-builder --${{ matrix.os == 'macos-latest' && 'mac' || matrix.os == 'windows-latest' && 'win' || 'linux' }} --publish never
        working-directory: ./player
      - uses: actions/upload-artifact@v4
        with:
          name: ${ matrix.os }-build
          path: |
            */dist-electron/*.dmg
            */dist-electron/*.exe
            */dist-electron/*.AppImage
            */dist-electron/*.deb
            dist-electron/*.dmg
            dist-electron/*.exe
            dist-electron/*.AppImage
            dist-electron/*.deb
            */dist/*.dmg
            */dist/*.exe
            */dist/*.AppImage
            */dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get version from package.json
        id: get_version
        run: |
          VER=$(node -p "require('./player/package.json').version")
          echo "VERSION=v$VER" >> $GITHUB_ENV
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${ env.VERSION }
          files: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.AppImage
            dist/**/*.deb
        env:
          GITHUB_TOKEN: ${ secrets.GITHUB_TOKEN }
