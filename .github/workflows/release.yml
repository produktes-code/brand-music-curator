name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies & Compile Backend
        run: |
          cd audio-engine
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller --name analyzer --onefile analyzer.py

      - name: Install Node Dependencies
        run: |
          npm install
        working-directory: ./player

      - name: Build and Package Electron App
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npm run pack:win
          else
            npm run pack:mac
          fi
        shell: bash
        working-directory: ./player
        env:
          PUBLISH: never
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            player/dist-electron/*.dmg
            player/dist-electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
